package:
  name: turing
  version: "0.1.0"

source:
  git_url: https://github.com/TuringCore/turing.git
  git_rev: main

build:
  number: 0
  script: |
    set -euxo pipefail
    mkdir -p "$PREFIX/lib/mojo"
    mojo package src/turing -o "$PREFIX/lib/mojo/turing.mojopkg"

requirements:
  build:
    - mojo-compiler
  host:
    - mojo-compiler
  run:
    - mojo-compiler

test:
  source_files:
    - src/turing/*.mojo
    - tests/*.mojo
  commands:
    - test -f "$PREFIX/lib/mojo/turing.mojopkg"
    - mojo -I src tests/test_hkt_demo.mojo
    - mojo -I src tests/test_inference_paths.mojo

about:
  summary: Focused Mojo library for Bayesian probabilistic programming.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - TuringCore

